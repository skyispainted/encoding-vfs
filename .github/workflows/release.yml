name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install WinFsp
        shell: pwsh
        run: |
          winget install WinFsp.WinFsp --accept-package-agreements --accept-source-agreements
          # Wait for installation to complete
          Start-Sleep -Seconds 5

      - name: Build
        run: cargo build --release

      - name: Prepare package
        shell: pwsh
        run: |
          $version = (Select-String -Path "encoding-vfs-cli\Cargo.toml" -Pattern 'version\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          $pkgDir = "encoding-vfs-v$version-windows-x86_64"
          New-Item -ItemType Directory -Path $pkgDir
          Copy-Item "target\release\encoding-vfs.exe" -Destination $pkgDir
          Copy-Item "target\release\git.exe" -Destination $pkgDir
          # Copy WinFsp DLL
          Copy-Item "C:\Program Files (x86)\WinFsp\bin\winfsp-x64.dll" -Destination $pkgDir
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "PKG_DIR=$pkgDir" >> $env:GITHUB_ENV

      - name: Create README
        shell: pwsh
        run: |
          $readme = @"
          # Encoding VFS v$($env:VERSION) (Windows)

          ## Contents
          - encoding-vfs.exe - Main VFS program
          - git.exe - Transparent git wrapper
          - winfsp-x64.dll - WinFsp runtime library

          ## Quick Start (PowerShell)
          1. Mount: .\encoding-vfs.exe -b C:\path\to\project -d Y
          2. Setup PATH: `$env:PATH = "`$PWD;`$env:PATH"
          3. Use: cd Y:\; git status

          ## Quick Start (CMD)
          1. Mount: encoding-vfs.exe -b C:\path\to\project -d Y
          2. Setup PATH: set PATH=%CD%;%PATH%
          3. Use: cd Y:\ & git status

          ## Permanent PATH setup
          PowerShell: [Environment]::SetEnvironmentVariable("PATH", "`$PWD;`$env:PATH", "User")
          CMD: setx PATH "%CD%;%PATH%"
          Restart terminal after setting.
          "@
          Set-Content -Path "$env:PKG_DIR\README.md" -Value $readme -Encoding UTF8

      - name: Create archive
        shell: pwsh
        run: Compress-Archive -Path "$env:PKG_DIR\*" -DestinationPath "$env:PKG_DIR.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: encoding-vfs-windows
          path: encoding-vfs-v*-windows-x86_64.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Prepare package
        run: |
          VERSION=$(grep -m1 'version' encoding-vfs-cli/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          PKG_DIR="encoding-vfs-v${VERSION}-linux-x86_64"
          mkdir -p "$PKG_DIR"
          cp target/release/encoding-vfs "$PKG_DIR/"
          cp target/release/git "$PKG_DIR/"
          chmod +x "$PKG_DIR"/*
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PKG_DIR=$PKG_DIR" >> $GITHUB_ENV

      - name: Create README
        run: |
          cat > "${{ env.PKG_DIR }}/README.md" << README
          # Encoding VFS v${{ env.VERSION }} (Linux)

          ## Contents
          - encoding-vfs - Main VFS program
          - git - Transparent git wrapper

          ## Quick Start
          1. Mount: ./encoding-vfs -b /path/to/project -m /mnt/vfs
          2. Setup PATH: export PATH="\$PWD:\$PATH"
          3. Use: cd /mnt/vfs && git status

          ## Permanent PATH setup
          Add to ~/.bashrc:
          export PATH="/path/to/extracted/folder:\$PATH"
          README

      - name: Create archive
        run: tar -czf "${{ env.PKG_DIR }}.tar.gz" "${{ env.PKG_DIR }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: encoding-vfs-linux
          path: encoding-vfs-v*-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -laR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
