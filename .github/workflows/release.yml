name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --features mount
        working-directory: ${{ github.workspace }}

      - name: Upload binary
        shell: pwsh
        run: |
          Copy-Item target\release\encoding-vfs.exe encoding-vfs-Windows-x64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: encoding-vfs-Windows-x64.exe
          generate_release_notes: true
          draft: true

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse-dev libfuse3-dev pkg-config pkgconf
          which pkg-config
          pkg-config --version

      - name: Setup Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        run: |
          cp target/release/encoding-vfs encoding-vfs-Linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: encoding-vfs-Linux-x64
          generate_release_notes: true
          draft: true
